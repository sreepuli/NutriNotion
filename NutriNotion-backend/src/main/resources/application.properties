spring.application.name=nutrinotion-backend

# ?? Profile ???????????????????????????????????????????????????????????????????
# Loads application-local.properties automatically in local dev.
# On production server, remove this line and set env vars instead.
spring.profiles.active=local

# ?? Database ??????????????????????????????????????????????????????????????????
# Real values are in application-local.properties (gitignored) or env vars
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/nutrinotion}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ?? Gemini API ????????????????????????????????????????????????????????????????
# Models confirmed available via GET /v1beta/models for this API key on 2026-03-08
gemini.api.key=${GEMINI_API_KEY}
gemini.api.base.url=https://generativelanguage.googleapis.com/v1beta/models
# Primary model
gemini.api.model=gemini-2.5-flash-lite
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent
# Fallback model if primary is rate-limited
gemini.api.fallback.model=gemini-2.0-flash-lite
gemini.api.fallback.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent
# Max retries on 429 before switching to fallback model
gemini.api.max-retries=2



